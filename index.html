<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkDrive | Acesse sua nuvem com simplicidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body class="page-auth">
    <main class="auth-card card">
      <header class="auth-header">
        <img class="logo" src="assets/logo.svg" alt="Logo LinkDrive" />
        <h1>LinkDrive</h1>
        <p>Acesse sua nuvem com simplicidade.</p>
      </header>

      <form class="auth-form" autocomplete="on">
        <div class="form-field">
          <label for="fullName">Nome Completo</label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input
              id="fullName"
              name="fullName"
              type="text"
              placeholder="Como deseja ser chamado?"
              autocomplete="name"
              required
            />
          </div>
        </div>

        <div class="form-field">
          <label for="email">E-mail</label>
          <div class="input-wrap">
            <i class="bi bi-envelope"></i>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="nome@exemplo.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <button class="btn-primary btn-block" type="submit">Continuar</button>
      </form>
    </main>
    <script src="scripts/main.js" defer></script>
  </body>
</html>
